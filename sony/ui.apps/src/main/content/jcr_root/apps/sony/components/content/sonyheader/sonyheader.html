 <sly data-sly-use.model="com.sony.core.models.HeaderModel"/>

<style>

/* ================= HEADER BASE ================= */

.sonyECGlobalHeader {
    background-color: #000 !important;
    width: 100%;
}

.MegaHeader {
    background-color: #000 !important;
}

.MegaHeader_inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    min-height: 64px;
}

/* ================= LEFT ================= */

.MegaHeader_left {
    display: flex;
    align-items: center;
    gap: 45px;
}

.MegaHeader_sonyIcon {
    height: 22px;
}

/* ================= MENU ================= */

.MegaHeader_links {
    list-style: none !important;
    display: flex !important;
    gap: 30px;
    margin: 0;
    padding: 0;
    white-space: nowrap;
}

.MegaHeader_linksItem {
    list-style: none !important;
}

.MegaHeader_link {
    text-decoration: none;
    color: #fff !important;
    font-size: 14px;
    font-weight: 500;
}

.MegaHeader_link:hover {
    opacity: 0.7;
}

/* ================= RIGHT ================= */

.MegaHeader_rightMenu {
    display: flex;
    align-items: center;
}

.MegaHeader_icons {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* ================= SEARCH BAR ================= */

.MegaHeader_searchForm {
    display: flex;
    align-items: center;
    border: 1px solid #fff;
    border-radius: 25px;
    padding: 6px 12px;
    gap: 8px;
}

.MegaHeader_searchIcon {
    color: #fff;
    font-size: 14px;
}

.MegaHeader_searchInput {
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 14px;
    width: 140px;
}

.MegaHeader_searchInput::placeholder {
    color: #ccc;
}

/* ================= ICONS ================= */

.MegaHeader_icon {
    text-decoration: none;
    font-size: 18px;
    color: #fff !important;
    display: flex;
    align-items: center;
}

</style>


<div class="sonyECGlobalHeader aem-GridColumn aem-GridColumn--default--12">

    <div class="MegaHeader">
        <div class="MegaHeader_inner">

            <!-- LEFT -->
            <div class="MegaHeader_left">

                <!-- LOGO -->
                <div class="MegaHeader_sonyIconWrapper">
                    <a class="MegaHeader_sonyIcon_Link" href="${model.logoLink}">
                        <img 
                            class="MegaHeader_sonyIcon" 
                            src="${model.logo}" 
                            alt="Sony"/>
                    </a>
                </div>

                <!-- MENU -->
                <div class="MegaHeader_leftMenu">
                    <div class="MegaHeader_linksWrapper">

                        <ul class="MegaHeader_links" data-sly-list.item="${model.links}">
                            
                            <li class="MegaHeader_linksItem">
                                <a class="MegaHeader_link" href="${item.url}">
                                    ${item.label}
                                </a>
                            </li>

                        </ul>

                    </div>
                </div>

            </div>

            <!-- RIGHT -->
            <div class="MegaHeader_rightMenu">
                <div class="MegaHeader_icons">

                    <!-- SEARCH -->
                    <form class="MegaHeader_searchForm" action="/search" method="get">
                        <span class="MegaHeader_searchIcon">🔍</span>
                        <input 
                            type="text" 
                            name="q" 
                            class="MegaHeader_searchInput" 
                            placeholder="${model.searchPlaceholder}" />
                    </form>

                    <!-- FAVORITE -->
                    <a href="#" class="MegaHeader_icon">❤</a>

                    <!-- USER -->
                    <a href="#" class="MegaHeader_icon">👤</a>

                </div>
            </div>

        </div>
    </div>

</div>
