<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.all @ categories='myapp.registration'}"/>

<div style="max-width:900px;margin:20px auto;padding:20px;
            border:1px solid #ccc;border-radius:10px;
            font-family:Arial;box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center;">Class 12 Admission Form</h2>

    <form id="registrationForm" method="POST" novalidate>

        <!-- ✅ CSRF TOKEN -->
        <input type="hidden" name=":cq_csrf_token" value="">

        <input type="text" name="firstName" placeholder="First Name" style="width:100%;padding:10px;margin-bottom:10px;">
        <input type="text" name="lastName" placeholder="Last Name" style="width:100%;padding:10px;margin-bottom:10px;">
        <input type="date" name="dob" id="dob" style="width:100%;padding:10px;margin-bottom:10px;">
        <input type="number" name="age" id="age" placeholder="Age" readonly style="width:100%;padding:10px;margin-bottom:10px;background:#f5f5f5;">
        <input type="tel" name="mobile" placeholder="Mobile Number" style="width:100%;padding:10px;margin-bottom:10px;">
        <input type="email" name="email" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px;">
        <input type="password" name="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;">

        <button type="submit"
                style="width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:5px;">
            Submit Application
        </button>

    </form>

    <div id="regMsg" style="margin-top:15px;text-align:center;color:red;"></div>
</div>
